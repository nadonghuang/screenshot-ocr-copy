  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="234" ry="234" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="234" ry="234" fill="url(#topGlow)"/>

  <g filter="url(#docShadow)">
