<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7AC3F5"/>
      <stop offset="0.5" stop-color="#2A7FEA"/>
      <stop offset="1" stop-color="#104CA4"/>
    </linearGradient>
    <radialGradient id="topGlow" cx="0.5" cy="0.12" r="0.6">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="docLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F0F5FB"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7FEBFF" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#C0F6FF"/>
      <stop offset="1" stop-color="#7FEBFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="docShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="22"/>
      <feOffset dy="26"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.42"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="beamGlow" x="-10%" y="-250%" width="120%" height="600%">
